<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Do you love me?</title>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a3d0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 60px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            min-height: 60px;
            align-items: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #yesBtn {
            background: #90ee90;
            color: #0a3d0a;
            font-weight: bold;
        }

        #yesBtn:hover {
            background: #98fb98;
        }

        #noBtn {
            background: #cc0000;
            color: white;
            font-weight: bold;
        }

        #noBtn:hover {
            background: #ff0000;
        }

        #message {
            display: none;
            margin-top: 20px;
            font-size: 2em;
            color: #ff6b9d;
            font-weight: bold;
        }

        #sadMessage {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #cc0000;
            color: #ffffff;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: bold;
            z-index: 9999;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 3px solid #000;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Do you love me?</h1>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
        <div id="message">I love u too babi</div>
    </div>
    <div id="sadMessage"> 🥹 really? u don't love me? 🥹</div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const message = document.getElementById('message');
        const sadMessage = document.getElementById('sadMessage');
        const yesBtn = document.getElementById('yesBtn');
        const h1 = document.querySelector('h1');

        let repositionCount = 0;
        let sadMessageVisible = false;

        // Make No button run away on hover
        noBtn.addEventListener('mouseover', () => {
            // If sad message is visible, hide it on hover and reset counter
            if (sadMessageVisible) {
                sadMessageVisible = false;
                sadMessage.style.display = 'none';
                repositionCount = 0;
                return;
            }

            // Move button away
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            repositionCount++;

            // Show sad message after 3 repositions
            if (repositionCount >= 3) {
                sadMessageVisible = true;
                sadMessage.style.display = 'block';

                // Position sad message in the center of the screen
                const containerRect = document.querySelector('.container').getBoundingClientRect();
                const h1Rect = document.querySelector('h1').getBoundingClientRect();
                const screenCenterY = window.innerHeight / 2;
                const screenCenterX = window.innerWidth / 2;
                sadMessage.style.top = screenCenterY + 'px';
                sadMessage.style.left = '50%';
                sadMessage.style.transform = 'translate(-50%, -50%)';
                sadMessage.style.width = 'fit-content';
                sadMessage.style.maxWidth = '60%';

                // Keep No button visible in random positions, never behind sad message
                // Calculate a safe zone around the sad message (150px radius)
                const sadLeft = parseInt(sadMessage.style.left) - 200;
                const sadTop = parseInt(sadMessage.style.top) - 80;
                const safeLeft = sadLeft - 100;
                const safeTop = sadTop - 100;
                const safeRight = window.innerWidth - (sadLeft + 400 + 100);
                const safeBottom = window.innerHeight - (sadTop + 80 + 100);

                const x = Math.max(safeLeft, Math.min(safeRight, Math.random() * (window.innerWidth - 150)));
                const y = Math.max(safeTop, Math.min(safeBottom, Math.random() * (window.innerHeight - 60)));

                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
            }
        });

        // Handle Yes button click
        yesBtn.addEventListener('click', () => {
            message.style.display = 'block';
        });

        // Hide sad message when Yes is clicked
        yesBtn.addEventListener('click', () => {
            if (sadMessageVisible) {
                sadMessageVisible = false;
                sadMessage.style.display = 'none';
                noBtn.style.display = 'block';
                noBtn.style.position = 'static';
                noBtn.style.left = 'auto';
                noBtn.style.top = 'auto';
            }
        });

        // Hide sad message when clicking No (if visible)
        noBtn.addEventListener('click', () => {
            if (sadMessageVisible) {
                sadMessageVisible = false;
                sadMessage.style.display = 'none';
                noBtn.style.display = 'block';
                noBtn.style.position = 'static';
                noBtn.style.left = 'auto';
                noBtn.style.top = 'auto';
            } else {
                // Reset reposition count on direct click
                repositionCount = 0;
            }
        });
    </script>
</body>
</html>
